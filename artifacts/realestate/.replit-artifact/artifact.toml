kind = "web"
previewPath = "/"
title = "Real Estate Portfolio"
version = "1.0.0"
id = "artifacts/realestate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21728

[services.development]
run = "pnpm --filter @workspace/realestate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/realestate", "run", "build" ]
publicDir = "artifacts/realestate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21728"
BASE_PATH = "/"
